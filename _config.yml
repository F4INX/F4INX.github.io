# Setup
title:            RF cat corner
tagline:          'analog electronics, RF, EM simulations, ...'
description:      "Blog edited by Hadrien F4INX on analog electronics, RF, EM simulations, ...."
baseurl:          '/'
paginate:         5

# About and contact
author:
  name:           'Hadrien Theveneau'
  url:            https://f4inx.github.io

# Collections:
collections:
  regtests:
    output: true
  unreleased:
    output: true
  hidden:
    output: true
  details:
    output: true
  drafts:
    output: true

# Feed
feed:
  path: /atom.xml

# Gems
plugins:
  # Jekyll dependencies
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
